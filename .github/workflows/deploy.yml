name: Deploy

on:
  workflow_dispatch:
    inputs:
      location:
        description: Azure region
        required: false
        default: swedencentral
        type: string
      teardown:
        description: Run scripts/teardown.sh at the end
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: preflight
        name: Check required files and variables
        run: |
          run_deploy=true
          run_teardown=false

          if [ ! -f scripts/deploy.sh ]; then
            echo "::notice::scripts/deploy.sh not present yet; skipping deploy workflow."
            run_deploy=false
          fi

          if [ -z "${{ vars.AZURE_CLIENT_ID }}" ] || [ -z "${{ vars.AZURE_TENANT_ID }}" ] || [ -z "${{ vars.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "::notice::AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID repo variables are not fully configured; skipping deploy."
            run_deploy=false
          fi

          if [ "${{ inputs.teardown }}" = "true" ]; then
            if [ -f scripts/teardown.sh ]; then
              run_teardown=true
            else
              echo "::notice::teardown requested, but scripts/teardown.sh is missing; teardown will be skipped."
            fi
          fi

          echo "run_deploy=$run_deploy" >> "$GITHUB_OUTPUT"
          echo "run_teardown=$run_teardown" >> "$GITHUB_OUTPUT"
          echo "frontdoor_url=${{ vars.DEMO_FRONTDOOR_URL }}" >> "$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        if: steps.preflight.outputs.run_deploy == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Run deployment script
        if: steps.preflight.outputs.run_deploy == 'true'
        run: bash scripts/deploy.sh "${{ inputs.location }}"

      - name: Smoke test Front Door endpoints
        if: steps.preflight.outputs.run_deploy == 'true' && steps.preflight.outputs.frontdoor_url != ''
        run: |
          fd_url="${{ steps.preflight.outputs.frontdoor_url }}"
          fd_url="${fd_url%/}"
          deadline=$((SECONDS + 300))
          passed=false

          while [ "$SECONDS" -lt "$deadline" ]; do
            allowed_code="$(curl -sS -o /tmp/allowed.out -w '%{http_code}' "${fd_url}/try/allowed" || true)"
            denied_code="$(curl -sS -o /tmp/denied.out -w '%{http_code}' "${fd_url}/try/denied" || true)"

            if [ "$allowed_code" -ge 200 ] && [ "$allowed_code" -lt 400 ] && [ "$denied_code" -ge 400 ]; then
              passed=true
              break
            fi

            sleep 10
          done

          if [ "$passed" != "true" ]; then
            echo "::error::Smoke tests did not reach expected outcomes within 5 minutes."
            echo "::error::Expected /try/allowed => 2xx/3xx and /try/denied => 4xx/5xx."
            echo "::error::Last /try/allowed status: $allowed_code"
            echo "::error::Last /try/denied status: $denied_code"
            exit 1
          fi

      - name: Skip smoke tests when demo URL is unset
        if: steps.preflight.outputs.run_deploy == 'true' && steps.preflight.outputs.frontdoor_url == ''
        run: echo "::notice::DEMO_FRONTDOOR_URL repo variable is not set; skipping smoke test."

      - name: Run teardown script
        if: always() && steps.preflight.outputs.run_teardown == 'true'
        run: bash scripts/teardown.sh
